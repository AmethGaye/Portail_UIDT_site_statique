<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="inscrire.css">
    <link rel="stylesheet" href="css/all.css">
    <link rel="stylesheet" href="fonts/fonts.css">
    <title>Inscription - Université Iba Der Thiam de Thiès (UIDT)</title>
</head>
<body>
    
    <div class="form-container">
        <div class="ins">
            <h1 style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                <span>Inscription</span>
                <a href="index.html" style="font-size: 1rem; text-decoration: none; color: #00558b; font-family: sans-serif;"><i class="fa-solid fa-arrow-left"></i> Accueil</a>
            </h1>
        </div>
        <form class="form_1" action="#">
            <div class="form-item b">
                <label for="nom">nom</label>
                <input type="text" name="nom" id="nom" placeholder="nom" required>
            </div>
            <div class="form-item b">
                <label for="prenom">prénom</label>
                <input type="text" name="prenom" id="prenom" placeholder="prénom" required>
            </div>
            <div class="form-item b">
                <label for="dossier">numéro de dossier</label>
                <input type="number" name="dossier" id="dossier" placeholder="21030130042" required>
            </div>
            <div class="form-item">
                <label for="email">email</label>
                <input type="email" name="email" id="email" placeholder="example@gmail.com" required>
            </div>
            <div class="form-item b">
                <label for="adresse">adresse</label>
                <input type="text" name="adresse" id="adresse" placeholder="8196 Pikine Nord" required>
            </div>
            <div class="form-item b">
                <label for="telephone">numéro de téléphone</label>
                <input type="number" name="telephone" id="telephone" placeholder="781234313" required>
            </div>
            <div class="form-item .a">
                <label for="ufr">UFR </label>
                <select class="ufr" name="ufr" id="ufr">
                    <option value="UFR-SET">UFR-SET</option>
                    <option value="UFR-SES">UFR-SES</option>
                    <option value="UFR-SANTE">UFR-SANTE</option>
                    <option value="UFR-SI">UFR-SI</option>
                </select>
            </div>
            <div class="form-item .a">
                <label for="filiere">filière </label>
                <select class="ufr" name="filiere" id="filiere">
                    <option value="LGI">LGI</option>
                    <option value="LMI">LMI</option>
                    <option value="LPC">LPC</option>
                    <option value="LSEE">LSEE</option>
                    <option value="MIO">MIO</option>
                    <option value="MTH">MTH</option>
                    <option value="LEA">LEA</option>
                    <option value="LAC">LAC</option>
                </select>
            </div>

            <div class="p-mobile">
                <div class="h3">
                  <h3>mode de paiement</h3>
                </div>
                <div class="opera">
                    <div class="om">
                        <label for="om">orange money</label>
                        <input type="radio" id="om" name="radio" required>
                    </div>
                    <div class="wave">
                        <label for="wave">wave</label>
                        <input type="radio" id="wave" name="radio">
                    </div>
                    <div class="free">
                        <label for="free">free money</label>
                        <input type="radio" id="free" name="radio">
                    </div>
                </div>
            </div>
            <div class="button">
              <input type="submit" name="submit" value="S'inscrire">
            </div>
        </form>
    </div>

    <script src="all.js"> </script>
</body>

</html>
